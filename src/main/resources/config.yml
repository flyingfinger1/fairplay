# FairPlay Plugin Configuration

# Embedded HTTP server for the resource pack (translations).
# Clients automatically download the pack on login.
#
# resource-pack-host: Address that clients can reach.
#   Local server:      localhost
#   LAN / Dedicated:   e.g. 192.168.1.100 or your-domain.com
resource-pack-host: localhost
resource-pack-port: 8765

# true  → Clients MUST accept the pack (otherwise kicked)
# false → Clients may decline (they will only see raw translation keys)
resource-pack-required: false
