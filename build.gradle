plugins {
    id 'java'
}

group = 'de.fairplay'
version = '1.0.0'

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

compileJava.options.compilerArgs += ['-Xlint:deprecation']

repositories {
    mavenCentral()
    maven {
        name = 'papermc'
        url = 'https://repo.papermc.io/repository/maven-public/'
    }
}

dependencies {
    compileOnly 'io.papermc.paper:paper-api:1.21.8-R0.1-SNAPSHOT'
    // SQLite JDBC bundled into the JAR (no external dependency required)
    implementation 'org.xerial:sqlite-jdbc:3.45.1.0'
}

jar {
    // Bundle all dependencies into the plugin JAR (fat JAR without Shadow plugin)
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

// Local-only tasks (deploy etc.) live in local.gradle — not committed to git
if (file('local.gradle').exists()) {
    apply from: 'local.gradle'
}
