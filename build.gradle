plugins {
    id 'java'
}

group = 'de.fairplay'
version = '1.0.3'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

compileJava.options.compilerArgs += ['-Xlint:deprecation']

repositories {
    mavenCentral()
    maven {
        name = 'papermc'
        url = 'https://repo.papermc.io/repository/maven-public/'
    }
}

dependencies {
    compileOnly 'io.papermc.paper:paper-api:26.2.build.34-alpha'
    // SQLite JDBC is declared in plugin.yml `libraries` — Paper downloads it automatically.
    // Listed as compileOnly here so the IDE and compiler can resolve the classes.
    compileOnly 'org.xerial:sqlite-jdbc:3.45.1.0'
}

// Local-only tasks (deploy etc.) live in local.gradle — not committed to git
if (file('local.gradle').exists()) {
    apply from: 'local.gradle'
}
